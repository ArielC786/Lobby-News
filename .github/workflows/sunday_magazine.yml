name: Generate and Distribute Sunday Magazine

on:
  schedule:
    # Triggers every Sunday at 8:30 PM UTC
    # Triggers every Sunday at 8:30 PM in your local time (UTC+8)
    # 8:30 PM UTC+8 = 12:30 UTC
    - cron: '30 12 * * 0'
  workflow_dispatch: # This allows you to click a "Run Now" button manually

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to publish the free website

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Turn on Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install AI & Web Scraping Libraries
      run: |
        python -m pip install --upgrade pip
        pip install feedparser beautifulsoup4 lxml jinja2

    - name: Fetch Live News & Generate the Magazine (HTML)
      run: python draft_generator.py

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Generate PDF Carousel
      shell: bash
      run: |
        set -euo pipefail
        CHROME_BIN=""
        if command -v google-chrome >/dev/null 2>&1; then
          CHROME_BIN="$(command -v google-chrome)"
        elif command -v google-chrome-stable >/dev/null 2>&1; then
          CHROME_BIN="$(command -v google-chrome-stable)"
        elif command -v chromium >/dev/null 2>&1; then
          CHROME_BIN="$(command -v chromium)"
        elif command -v chromium-browser >/dev/null 2>&1; then
          CHROME_BIN="$(command -v chromium-browser)"
        fi

        if [ -z "$CHROME_BIN" ]; then
          sudo apt-get update
          sudo apt-get install -y chromium || sudo apt-get install -y chromium-browser
          if command -v chromium >/dev/null 2>&1; then
            CHROME_BIN="$(command -v chromium)"
          elif command -v chromium-browser >/dev/null 2>&1; then
            CHROME_BIN="$(command -v chromium-browser)"
          fi
        fi

        echo "Using Chrome executable: ${CHROME_BIN:-<not found>}"
        test -n "$CHROME_BIN"
        export CHROME_BIN

        npm init -y >/dev/null 2>&1
        npm i --no-fund --no-audit puppeteer-core@24.15.0
        node - <<'NODE'
        const puppeteer = require('puppeteer-core');
        const chromePath = process.env.CHROME_BIN;
        if (!chromePath) {
          throw new Error('CHROME_BIN is not set');
        }

        (async () => {
          const browser = await puppeteer.launch({
            headless: true,
            executablePath: chromePath,
            args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
          });
          const page = await browser.newPage();
          page.setDefaultNavigationTimeout(60000);
          page.setDefaultTimeout(60000);

          const fileUrl = 'file://' + process.cwd() + '/draft_preview.html';
          await page.goto(fileUrl, { waitUntil: 'networkidle2' });

          await page.pdf({
            path: 'Lobby_News_Carousel.pdf',
            printBackground: true,
            preferCSSPageSize: true,
            scale: 1,
            margin: { top: 0, right: 0, bottom: 0, left: 0 }
          });
          await browser.close();
        })().catch((e) => {
          console.error(e);
          process.exit(1);
        });
        NODE

    - name: Upload PDF (artifact)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Lobby_News_Carousel
        path: Lobby_News_Carousel.pdf
        if-no-files-found: warn

    - name: Deliver Email to Me (PDF)
      if: always()
      env:
        GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python email_delivery.py

    - name: Host Magazine on GitHub Pages (Free Web Hosting)
      run: |
        cp draft_preview.html index.html
    
    - name: Deploy to Cloud Web Server
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        keep_files: true
        publish_branch: gh-pages
        exclude_assets: '.github,*.py'

    - name: Broadcast to LinkedIn
      env:
        LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
      run: python linkedin_autopost.py
